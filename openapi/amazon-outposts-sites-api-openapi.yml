                  - POWER_10_KVA
                  - POWER_15_KVA
                  - POWER_30_KVA
                PowerPhase:
                  description: '<p>The power option that you can provide for hardware. </p> <ul> <li> <p>Single-phase AC feed: 200 V to 277 V, 50 Hz or 60 Hz</p> </li> <li> <p>Three-phase AC feed: 346 V to 480 V, 50 Hz or 60 Hz</p> </li> </ul>'
                  type: string
                  enum:
