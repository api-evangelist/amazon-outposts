                  type: string
                  enum:
                  - UPLINK_COUNT_1
                  - UPLINK_COUNT_2
                  - UPLINK_COUNT_3
                  - UPLINK_COUNT_4
                  - UPLINK_COUNT_5
                  - UPLINK_COUNT_6
                  - UPLINK_COUNT_7
                  - UPLINK_COUNT_8
                  - UPLINK_COUNT_12
                  - UPLINK_COUNT_16
                FiberOpticCableType:
                  description: 'The type of fiber that you will use to attach the Outpost to your network. '
