naftiko: 1.0.0-alpha2
info:
  label: Amazon Outposts API Workflow
  description: Workflow capability composing Amazon Outposts APIs for developers and operators.
  tags:
  - Amazon Outposts
  - AWS
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    AWS_SIGV4_AUTH: AWS_SIGV4_AUTH
capability:
  consumes:
  - type: http
    namespace: openapi.yml
    baseUri: http://outposts.{region}.amazonaws.com
    description: Amazon Web Services Outposts is a fully managed service that extends Amazon Web Services infrastruct
    authentication:
      type: apikey
      key: Authorization
      value: '{{AWS_SIGV4_AUTH}}'
      placement: header
    resources:
    - name: default
      path: /default
      description: Default operations for AWS Outposts
      operations:
      - name: CancelOrder
        method: POST
        description: CancelOrder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: OrderId
          in: path
          type: string
          required: true
          description: ' The ID of the order. '
      - name: CreateOrder
        method: POST
        description: CreateOrder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: ListOutposts
        method: GET
        description: ListOutposts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: NextToken
          in: query
          type: string
          required: false
          description: ''
        - name: MaxResults
          in: query
          type: integer
          required: false
          description: ''
        - name: LifeCycleStatusFilter
          in: query
          type: array
          required: false
          description: Filters the results by the lifecycle status.
        - name: AvailabilityZoneFilter
          in: query
          type: array
          required: false
          description: Filters the results by Availability Zone (for example, <code>us-east-1a</code>).
        - name: AvailabilityZoneIdFilter
          in: query
          type: array
          required: false
          description: Filters the results by AZ ID (for example, <code>use1-az1</code>).
      - name: CreateOutpost
        method: POST
        description: CreateOutpost
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: ListSites
        method: GET
        description: ListSites
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: NextToken
          in: query
          type: string
          required: false
          description: ''
        - name: MaxResults
          in: query
          type: integer
          required: false
          description: ''
        - name: OperatingAddressCountryCodeFilter
          in: query
          type: array
          required: false
          description: Filters the results by country code.
        - name: OperatingAddressStateOrRegionFilter
          in: query
          type: array
          required: false
          description: Filters the results by state or region.
        - name: OperatingAddressCityFilter
          in: query
          type: array
          required: false
          description: Filters the results by city.
      - name: CreateSite
        method: POST
        description: CreateSite
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: GetOutpost
        method: GET
        description: GetOutpost
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: OutpostId
          in: path
          type: string
          required: true
          description: ' The ID or the Amazon Resource Name (ARN) of the Outpost. '
      - name: UpdateOutpost
        method: PATCH
        description: UpdateOutpost
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: OutpostId
          in: path
          type: string
          required: true
          description: ' The ID or the Amazon Resource Name (ARN) of the Outpost. '
        body:
          type: json
          data: {}
      - name: DeleteOutpost
        method: DELETE
        description: DeleteOutpost
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: OutpostId
          in: path
          type: string
          required: true
          description: ' The ID or the Amazon Resource Name (ARN) of the Outpost. '
      - name: GetSite
        method: GET
        description: GetSite
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: SiteId
          in: path
          type: string
          required: true
          description: ' The ID or the Amazon Resource Name (ARN) of the site. '
      - name: UpdateSite
        method: PATCH
        description: UpdateSite
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: SiteId
          in: path
          type: string
          required: true
          description: ' The ID or the Amazon Resource Name (ARN) of the site. '
        body:
          type: json
          data: {}
      - name: DeleteSite
        method: DELETE
        description: DeleteSite
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: SiteId
          in: path
          type: string
          required: true
          description: ' The ID or the Amazon Resource Name (ARN) of the site. '
      - name: GetCatalogItem
        method: GET
        description: GetCatalogItem
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: CatalogItemId
          in: path
          type: string
          required: true
          description: The ID of the catalog item.
      - name: GetConnection
        method: GET
        description: GetConnection
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: ConnectionId
          in: path
          type: string
          required: true
          description: ' The ID of the connection. '
      - name: GetOrder
        method: GET
        description: GetOrder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: OrderId
          in: path
          type: string
          required: true
          description: The ID of the order.
      - name: GetOutpostInstanceTypes
        method: GET
        description: GetOutpostInstanceTypes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: OutpostId
          in: path
          type: string
          required: true
          description: ' The ID or the Amazon Resource Name (ARN) of the Outpost. '
        - name: NextToken
          in: query
          type: string
          required: false
          description: ''
        - name: MaxResults
          in: query
          type: integer
          required: false
          description: ''
      - name: GetSiteAddress
        method: GET
        description: GetSiteAddress
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: SiteId
          in: path
          type: string
          required: true
          description: ' The ID or the Amazon Resource Name (ARN) of the site. '
        - name: AddressType
          in: query
          type: string
          required: true
          description: 'The type of the address you request. '
      - name: ListAssets
        method: GET
        description: ListAssets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: OutpostId
          in: path
          type: string
          required: true
          description: ' The ID or the Amazon Resource Name (ARN) of the Outpost. '
        - name: HostIdFilter
          in: query
          type: array
          required: false
          description: Filters the results by the host ID of a Dedicated Host.
        - name: MaxResults
          in: query
          type: integer
          required: false
          description: ''
        - name: NextToken
          in: query
          type: string
          required: false
          description: ''
        - name: StatusFilter
          in: query
          type: array
          required: false
          description: Filters the results by state.
      - name: ListCatalogItems
        method: GET
        description: ListCatalogItems
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: NextToken
          in: query
          type: string
          required: false
          description: ''
        - name: MaxResults
          in: query
          type: integer
          required: false
          description: ''
        - name: ItemClassFilter
          in: query
          type: array
          required: false
          description: Filters the results by item class.
        - name: SupportedStorageFilter
          in: query
          type: array
          required: false
          description: Filters the results by storage option.
        - name: EC2FamilyFilter
          in: query
          type: array
          required: false
          description: Filters the results by EC2 family (for example, M5).
      - name: ListOrders
        method: GET
        description: ListOrders
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: OutpostIdentifierFilter
          in: query
          type: string
          required: false
          description: ' The ID or the Amazon Resource Name (ARN) of the Outpost. '
        - name: NextToken
          in: query
          type: string
          required: false
          description: ''
        - name: MaxResults
          in: query
          type: integer
          required: false
          description: ''
  exposes:
  - type: rest
    port: 8080
    namespace: amazon-outposts-api
    description: Unified REST API for Amazon Outposts.
    resources:
    - path: /v1/resources
      name: resources
      description: Primary Amazon Outposts resources
      operations:
      - method: GET
        name: list-resources
        description: List Amazon Outposts resources
        call: openapi.yml.list
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: amazon-outposts-mcp
    transport: http
    description: MCP server for AI-assisted Amazon Outposts operations.
    tools:
    - name: list-openapi.yml
      description: List and manage openapi.yml resources
      hints:
        readOnly: true
        openWorld: true
      call: openapi.yml.list
      outputParameters:
      - type: object
        mapping: $.
